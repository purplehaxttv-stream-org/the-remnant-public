name: "Bug Report"
description: "Something is broken or not working as intended"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect to happen, and what actually happened?
      placeholder: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make this happen on our end?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: What are you playing on?
      placeholder: "e.g., Windows 11, Steam"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: If applicable, add screenshots or video links to help explain the problem.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help us track this down.
    validations:
      required: false
